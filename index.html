<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予算・資金繰りシミュレーター</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ===== サイドバー ===== -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">📊</div>
    <div class="logo-main">予算・資金繰り</div>
    <div class="logo-sub">Simulator for 税理士</div>
  </div>

  <div class="nav-item" data-page="home">
    <span class="icon">🏠</span>ホーム
  </div>

  <div class="sidebar-section">データ入力</div>
  <div class="nav-item" data-page="budget">
    <span class="icon">📊</span>月次予算入力
  </div>
  <div class="nav-item" data-page="revenue">
    <span class="icon">🏢</span>顧問先売上管理
  </div>
  <div class="nav-item" data-page="import">
    <span class="icon">📂</span>試算表インポート
  </div>

  <div class="sidebar-section">シミュレーション</div>
  <div class="nav-item" data-page="simulation">
    <span class="icon">📈</span>単年度 PL/BS
  </div>
  <div class="nav-item" data-page="nextyear">
    <span class="icon">🔮</span>翌年度予測
  </div>
  <div class="nav-item" data-page="fiveyear">
    <span class="icon">📅</span>5か年計画
  </div>
  <div class="nav-item" data-page="cashflow">
    <span class="icon">💰</span>CF予測
  </div>

  <div class="sidebar-section">役員・税務</div>
  <div class="nav-item" data-page="execcomp">
    <span class="icon">👔</span>役員報酬最適化
  </div>
  <div class="nav-item" data-page="welfare">
    <span class="icon">🏥</span>法定福利費計算
  </div>
  <div class="nav-item" data-page="tax">
    <span class="icon">🧾</span>法人税シミュレーション
  </div>
  <div class="nav-item" data-page="ctax">
    <span class="icon">📋</span>消費税関連
  </div>

  <div class="sidebar-section">分析</div>
  <div class="nav-item" data-page="health">
    <span class="icon">🩺</span>財務健康診断
  </div>
</aside>

<!-- ===== メインエリア ===== -->
<div class="main-wrapper">

  <!-- ヘッダー -->
  <header class="app-header">
    <select id="company_select" class="header-select">
      <option value="">-- 会社を選択 --</option>
    </select>
    <select id="year_select" class="header-select">
      <option value="2025">2025年度</option>
    </select>
    <button class="btn btn-sm" onclick="openCompanyModal('')">＋会社追加</button>
    <button class="btn btn-sm" onclick="openCompanyModal(App.currentCompany?.id)">編集</button>
    <button class="btn btn-sm" style="border-color:rgba(255,100,100,.5);color:#ffaaaa" onclick="deleteCurrentCompany()">削除</button>
    <span class="header-spacer"></span>
    <span class="header-label">税理士向け予算管理システム</span>
  </header>

  <!-- コンテンツ -->
  <div id="main_content">
    <div class="no-data">
      <div style="font-size:48px;margin-bottom:16px">📊</div>
      <div style="font-size:16px;font-weight:700;color:var(--primary-dark);margin-bottom:8px">
        予算・資金繰りシミュレーター
      </div>
      <div style="color:var(--gray-500);margin-bottom:24px">
        会社を追加して予算入力を始めてください
      </div>
      <button class="btn-solid" onclick="openCompanyModal('')">＋ 会社を追加する</button>
    </div>
  </div>
</div>

<!-- ===== 会社モーダル ===== -->
<div class="modal" id="company_modal">
  <div class="modal-box">
    <h2>会社情報</h2>
    <input type="hidden" id="modal_company_id">
    <div class="form-group">
      <label>会社名 *</label>
      <input type="text" id="modal_company_name" class="form-input" placeholder="株式会社○○">
    </div>
    <div class="form-group">
      <label>資本金（円）</label>
      <input type="number" id="modal_capital" class="form-input" value="10000000" step="100000">
    </div>
    <div class="form-group">
      <label>協会けんぽ（都道府県）</label>
      <select id="modal_pref" class="form-input">
        <option>北海道</option><option>青森県</option><option>岩手県</option>
        <option>宮城県</option><option>秋田県</option><option>山形県</option>
        <option>福島県</option><option>茨城県</option><option>栃木県</option>
        <option>群馬県</option><option>埼玉県</option><option>千葉県</option>
        <option selected>東京都</option><option>神奈川県</option><option>新潟県</option>
        <option>富山県</option><option>石川県</option><option>福井県</option>
        <option>山梨県</option><option>長野県</option><option>静岡県</option>
        <option>愛知県</option><option>三重県</option><option>滋賀県</option>
        <option>京都府</option><option>大阪府</option><option>兵庫県</option>
        <option>奈良県</option><option>和歌山県</option><option>鳥取県</option>
        <option>島根県</option><option>岡山県</option><option>広島県</option>
        <option>山口県</option><option>徳島県</option><option>香川県</option>
        <option>愛媛県</option><option>高知県</option><option>福岡県</option>
        <option>佐賀県</option><option>長崎県</option><option>熊本県</option>
        <option>大分県</option><option>宮崎県</option><option>鹿児島県</option>
        <option>沖縄県</option>
      </select>
    </div>
    <div class="form-group">
      <label>決算月</label>
      <select id="modal_fiscal" class="form-input">
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3" selected>3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div style="border-top:1px solid var(--border);margin:14px 0;padding-top:14px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:10px">消費税・予定納税</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group" style="margin:0">
          <label>インボイス登録</label>
          <select id="modal_invoice" class="form-input">
            <option value="0">未登録</option>
            <option value="1">登録済</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>簡易課税届出</label>
          <select id="modal_kani" class="form-input">
            <option value="0">未届出</option>
            <option value="1">届出済</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
        <div class="form-group" style="margin:0">
          <label>基準期間売上高（円）</label>
          <input type="number" id="modal_kijun" class="form-input" value="0" step="100000">
        </div>
        <div class="form-group" style="margin:0">
          <label>業種区分（簡易課税用）</label>
          <select id="modal_business_type" class="form-input">
            <option value="1">第1種：卸売業（90%）</option>
            <option value="2">第2種：小売業（80%）</option>
            <option value="3">第3種：製造業等（70%）</option>
            <option value="4">第4種：その他（60%）</option>
            <option value="5" selected>第5種：サービス業等（50%）</option>
            <option value="6">第6種：不動産業（40%）</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px">
        <div class="form-group" style="margin:0">
          <label>法人税予定納税①（円）</label>
          <input type="number" id="modal_prepaid1" class="form-input" value="0" step="10000">
        </div>
        <div class="form-group" style="margin:0">
          <label>法人税予定納税②（円）</label>
          <input type="number" id="modal_prepaid2" class="form-input" value="0" step="10000">
        </div>
        <div class="form-group" style="margin:0">
          <label>消費税中間納付（円）</label>
          <input type="number" id="modal_ctax_prepaid" class="form-input" value="0" step="10000">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeCompanyModal()">キャンセル</button>
      <button class="btn-solid" onclick="saveCompanyForm()">保存</button>
    </div>
  </div>
</div>

<!-- ===== JS ===== -->
<script src="js/accounts.js"></script>
<script src="js/home.js"></script>
<script src="js/storage.js"></script>
<script src="js/calculations.js"></script>
<script src="js/tax.js"></script>
<script src="js/welfare.js"></script>
<script src="js/simulation.js"></script>
<script src="js/health.js"></script>
<script src="js/grid.js"></script>
<script src="js/export.js"></script>
<script src="js/import.js"></script>
<script src="js/exec-comp.js"></script>
<script src="js/revenue.js"></script>
<script src="js/app.js"></script>

</body>
</html>
