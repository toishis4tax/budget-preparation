<script>
(function(){
  var img=document.getElementById('s4-logo');
  function crop(){
    var c=document.createElement('canvas');c.width=64;c.height=64;
    var ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,img.naturalWidth*0.38,img.naturalHeight,0,0,64,64);
    var fav=document.querySelector('link[rel="icon"]');if(fav)fav.href=c.toDataURL();
  }
  if(img.complete)crop();else img.addEventListener('load',crop);
})();
</script>
